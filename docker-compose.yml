services:
  rag-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-document-service
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_BASE_URL=${MISTRAL_BASE_URL:-https://api.mistral.ai/v1}
      - LLM_MODEL=${LLM_MODEL:-mistral-small-latest}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-deepvk/USER-bge-m3}
      - CHUNK_SIZE=${CHUNK_SIZE:-256}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-64}
      - TOP_K_RESULTS=${TOP_K_RESULTS:-5}
      - DEBUG=${DEBUG:-false}
      - DATA_DIR=/app/data
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  hf_cache:
    driver: local
